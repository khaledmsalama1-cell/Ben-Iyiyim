name: ben_iyiyim
description: Ben İyiyim - Emergency Communication App for earthquakes and disasters
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_storage: ^12.3.2

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Programming
  dartz: ^0.10.1

  # Navigation
  go_router: ^14.3.0

  # UI & Theming
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Permissions & Device
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2

  # Storage
  shared_preferences: ^2.3.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  logger: ^2.4.0
  http: ^1.2.2
  flutter_localizations:
    sdk: flutter
  mask_text_input_formatter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

